<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskr — To-Do App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Satoshi:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <header class="card-header">
          <div class="header-top">
            <div class="logo">
              <span class="logo-dot"></span>
              Taskr
            </div>
            <div class="date-label" id="dateLabel"></div>
          </div>

          <div class="big-count-wrap">
            <span class="big-count" id="bigCount">0</span>
            <div class="count-labels">
              <span class="count-sub">tasks</span>
              <div class="mini-stats">
                <span class="done-badge" id="doneBadge">0 done</span>
              </div>
            </div>
          </div>

          <div class="progress-bar-wrap">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
        </header>

        <div class="filters">
          <button class="filter active" data-filter="all">All</button>
          <button class="filter" data-filter="active">Active</button>
          <button class="filter" data-filter="done">Done</button>
        </div>

        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            placeholder="What needs to be done?"
            autocomplete="off"
            maxlength="100"
          />
          <select id="prioSelect">
            <option value="medium">● Med</option>
            <option value="high">▲ High</option>
            <option value="low">▼ Low</option>
          </select>
          <button class="add-btn" id="addBtn">+</button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="empty" id="emptyState">
          <span class="empty-icon">◎</span>
          <p>No tasks here</p>
        </div>

        <footer class="card-footer">
          <span class="footer-note" id="footerNote"></span>
          <button class="clear-btn" id="clearBtn">Clear done</button>
        </footer>
      </div>
    </div>

    <div class="toasts" id="toasts"></div>

    <script src="script.js"></script>
  </body>
</html>
